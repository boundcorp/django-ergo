name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build Docker container
      run: |
        docker build -t django-ergo-test -f .cursor/Dockerfile .
        
    - name: Run tests with coverage in container
      run: |
        docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace django-ergo-test /bin/bash -c '
          bash .cursor/start.sh
          echo "Running tests with coverage..."
          pytest -v --ds=tests.example_app.settings --cov=tests.example_app --cov-report=html
          '

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 30
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          .coverage
          htmlcov/
        retention-days: 30