[tool:pytest]
DJANGO_SETTINGS_MODULE = tests.example_app.settings
python_files = tests.py test_*.py *_tests.py
testpaths = tests/
addopts = -v --tb=short
markers =
    openai: OpenAI integration tests (both real API and mocked)
    openai_real: Tests that use real OpenAI API (costs credits, requires TEST_OPENAI=true)
    openai_mocked: Tests that use saved fixtures to mock OpenAI API (fast, no costs)
    slow: Tests that are slow to run
    integration: Integration tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning